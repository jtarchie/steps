version: 1
name: summarize-critic-adopt
description: >
  The adopt variant of summarize-critic: the drafter CONTINUES its own
  conversation across revisions (context rung 3, `adopt: self`) instead of
  being re-primed with distilled feedback (rung 1, ctx). Same machine shape,
  same mock script — A/B the two context philosophies.

input:
  article: {type: string, required: true}

defaults:
  agent:
    model: ollama/qwen3:8b # any OpenAI-compatible endpoint works
    max_turns: 2 # tool-less states need one model call per turn; 2 is headroom
    reasoning: low # reasoning tokens are billed output; summarizing needs none

limits:
  max_transitions: 12 # hard backstop, independent of the guard below

states:
  draft:
    agent:
      adopt: self # revisits continue this state's own prior conversation
      # long loops can trim the replayed transcript for token hygiene:
      #   adopt: {from: self, last_turns: 6}
      prompt: |
        {{ if .ctx.critique }}
        Your reviewer rejected the previous draft for these reasons:
        {{ range .ctx.critique.issues }}- {{ . }}
        {{ end }}
        Revise the summary. Address every issue. Same format as before.
        {{ else }}
        Summarize the article below in at most 150 words, then give exactly
        three key points.
        ARTICLE:
        {{ .ctx.article }}
        {{ end }}
    output:
      schema:
        summary: {type: string}
        key_points: {type: array, items: {type: string}, minItems: 3, maxItems: 3}
    # no transitions: linear default flows to `critique`
    # NOTE the template: on revisit the article is NOT re-sent — it is already
    # in the adopted conversation. Only the feedback is appended.

  critique:
    agent:
      model: ollama/llama3.2:3b # fresh judge every round — deliberately NOT adopted,
      prompt: |                 # so scoring never drifts with conversational anchoring
        You are a strict editor. Score the summary 0-10 for accuracy and
        completeness against the article. List at most three concrete
        issues, each under 20 words.
        ARTICLE:
        {{ .ctx.article }}
        SUMMARY:
        {{ .ctx.draft.summary }}
    output:
      schema:
        score: {type: number}
        issues: {type: array, items: {type: string}, maxItems: 3} # schema doubles as an output-token budget
      events: [approve, revise]
    transitions:
      - on: approve
        when: output.score >= 8
        to: publish
      - on: revise
        when: visits.draft < 3 # the ENGINE bounds the loop, not the model
        to: draft
      - to: escalate # fallback: guard veto, or revisions exhausted

  escalate:
    human:
      prompt: >
        Revisions exhausted (last score {{ .ctx.critique.score }}).
        Approve the current draft or fail the run?
      timeout: 1h
      on_timeout: failed
    transitions:
      - on: approved
        to: publish
      - on: rejected
        to: failed

  publish:
    action: file.write # from the builtin tool library
    input:
      path: out/summary.md
      content: |
        {{ .ctx.draft.summary }}

        {{ range .ctx.draft.key_points }}- {{ . }}
        {{ end }}
    # linear default: last state flows to the implicit `done` terminal
