version: 1
name: pr-review
description: >
  Cheap scouts, expensive specialist. Small models triage each file and the
  PR as a whole; the large model only verifies flagged files with
  pre-gathered leads. Trivial PRs never reach it.

input:
  diff: {type: string, required: true} # e.g. gh pr diff 123 > pr.diff
  root: {type: string} # checkout root — enables file context beyond the diff
  title: {type: string}
  description: {type: string}

models:
  scout: lmstudio/google/gemma-4-e4b # small, local, effectively free
  senior: lmstudio/google/gemma-4-26b-a4b # larger, spent sparingly

defaults:
  agent: {model: scout, reasoning: low, max_turns: 2}

limits: {max_transitions: 15, max_tokens: 200000}

states:
  # With a root, each entry also carries the current file (capped) — scouts
  # see code around the patch, deterministically. add by: hunk for huge files.
  split_diff:
    action: diff.split
    input:
      diff: "{{ .ctx.diff }}"
      root: "{{ if .ctx.root }}{{ .ctx.root }}{{ end }}"
      context_bytes: "3000"

  # One hermetic micro-context per file. memo: unchanged files are free on
  # re-review; skip: one unparseable file doesn't sink the PR.
  scout_files:
    foreach: {over: ctx.split_diff.files, as: file, concurrency: 3, on_item_failure: skip}
    memo: true
    agent:
      prompt: |
        You are a scout for a senior code reviewer. Do NOT review. Identify
        what in this one file DESERVES the senior's attention, so they spend
        zero time researching: risky hunks, broken invariants, suspicious
        deletions. Echo the exact path. If nothing warrants attention, say
        risk low with no leads.
        {{ if .ctx.title }}PR: {{ .ctx.title }}{{ end }}
        FILE {{ .file.path }} ({{ .file.additions }}+ / {{ .file.deletions }}-):
        {{ .file.patch }}
        {{ if .file.content }}CURRENT FILE (for context):
        {{ .file.content }}{{ end }}
    output:
      schema:
        path: string
        risk: enum(low, medium, high)
        leads: [{where: string, concern: string}]

  # Same question, whole-PR altitude: sees stats and scout conclusions,
  # never full patches.
  scout_pr:
    memo: true
    agent:
      prompt: |
        You are a scout for a senior code reviewer, looking at a pull request
        AS A WHOLE. Identify cross-file concerns the per-file scouts below
        cannot see: APIs changed without callers updated, docs promising what
        code retracts, missing tests. Then decide: does this PR need the
        senior at all? Choose event "trivial" only if nothing warrants review.
        {{ if .ctx.title }}PR: {{ .ctx.title }} — {{ .ctx.description }}{{ end }}
        FILES:
        {{ range .ctx.split_diff.files }}- {{ .path }} ({{ .additions }}+/{{ .deletions }}-)
        {{ end }}
        SCOUT REPORTS:
        {{ range .ctx.scout_files.items }}- {{ .path }} [{{ .risk }}]:{{ range .leads }} {{ .concern }};{{ end }}
        {{ end }}
    output:
      schema:
        themes: {type: array, maxItems: 4, items: string}
        reading_order: string[]
      events: [deep_review, trivial]
    transitions:
      # The scout proposes skipping the senior; the guard only allows it when
      # no file scout was worried. Agent proposes, guards dispose.
      - {on: trivial, when: 'all(ctx.scout_files.items, {.risk == "low"})', to: note_trivial}
      - {to: deep_review}

  note_trivial:
    action: file.write
    input:
      path: out/review.md
      content: |
        ## Automated triage: no senior review needed

        {{ range .ctx.scout_pr.themes }}- {{ . }}
        {{ end }}
    transitions: done

  # The senior: only flagged files, one hermetic context per file, leads
  # pre-gathered. Verify or refute — never research. Medium-risk files route
  # to the small model; only high risk earns the big one.
  deep_review:
    foreach: {over: 'filter(ctx.scout_files.items, {.risk != "low"})', as: lead}
    memo: true
    agent:
      model: {expr: 'lead.risk == "high" ? "senior" : "scout"'}
      reasoning: high
      max_output_tokens: 8192
      max_turns: 6 # room for on-demand file reads before the verdict
      tools:
        # On-demand context: the senior decides WHEN it needs a full file;
        # the guard decides WHICH files exist for it — only files in this
        # PR, at most three reads, rooted where the machine says.
        - name: file.read
          max_calls: 3
          when: 'args.path in map(ctx.split_diff.files, {.path})'
          bind: {root: "{{ if .ctx.root }}{{ .ctx.root }}{{ end }}"}
      prompt: |
        You are a senior reviewer. A scout flagged this file with specific
        leads. Verify or refute EACH lead against the patch, and report any
        defect the scout missed. Do not restate the diff. Report only what
        you can substantiate. If the patch alone is not enough context, read
        the full file with file_read before concluding.
        PR THEMES:{{ range .ctx.scout_pr.themes }} {{ . }};{{ end }}
        FILE: {{ .lead.path }}
        LEADS:
        {{ range .lead.leads }}- {{ .where }}: {{ .concern }}
        {{ end }}
        PATCH:
        {{ range .ctx.split_diff.files }}{{ if eq .path $.lead.path }}{{ .patch }}{{ end }}{{ end }}
    output:
      schema:
        path: string
        findings: [{where: string, severity: enum(blocking|important|nit), issue: string, fix: string}]
        leads_refuted: string[]

  verdict:
    memo: true
    agent:
      model: senior
      prompt: |
        Compose the review verdict from these substantiated findings.
        Be direct; credit refuted leads briefly.
        {{ range .ctx.deep_review.items }}FILE {{ .path }}:
        {{ range .findings }}- [{{ .severity }}] {{ .where }}: {{ .issue }} — fix: {{ .fix }}
        {{ end }}{{ range .leads_refuted }}- refuted: {{ . }}
        {{ end }}
        {{ end }}
    output:
      schema: {summary: string, body: string}
      events: [approve, comment, request_changes]
    transitions:
      # The senior cannot approve past substantiated findings.
      - {on: approve, when: 'all(ctx.deep_review.items, {len(.findings) == 0})', to: write_review}
      - {to: write_review}

  write_review:
    action: file.write # swap for gh.post_review to publish for real
    input:
      path: out/review.md
      content: |
        ## Code review

        {{ .ctx.verdict.summary }}

        {{ .ctx.verdict.body }}
