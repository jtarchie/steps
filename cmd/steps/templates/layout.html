{{define "page_head"}}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{if .Refresh}}<meta http-equiv="refresh" content="{{.Refresh}}">{{end}}
<title>{{.Title}}</title>
<style>
:root {
  --bg: #ffffff; --fg: #1a1d21; --muted: #6a737d; --line: #e3e6e9;
  --card: #f6f8fa; --accent: #0b62d6;
  --queued: #6a737d; --running: #0b62d6; --parked: #b98300; --done: #1a7f37; --failed: #c62828;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14171a; --fg: #e6e9ec; --muted: #9aa4ae; --line: #2b3138;
    --card: #1c2126; --accent: #5aa2ff;
    --queued: #9aa4ae; --running: #5aa2ff; --parked: #e0b341; --done: #4bc26b; --failed: #ef6a5f;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--fg);
  font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
}
header {
  display: flex; align-items: baseline; gap: 1rem;
  padding: .7rem 1.2rem; border-bottom: 1px solid var(--line);
}
header .brand { font-weight: 700; color: var(--fg); text-decoration: none; }
header .sub { color: var(--muted); font-size: .85rem; }
main { max-width: 70rem; margin: 0 auto; padding: 1rem 1.2rem 3rem; }
h1 { font-size: 1.2rem; margin: 1rem 0 .5rem; }
h2 { font-size: 1rem; margin: 1.5rem 0 .5rem; }
a { color: var(--accent); }
code, .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: .86em; }
table { border-collapse: collapse; width: 100%; }
th, td { text-align: left; padding: .35rem .6rem; border-bottom: 1px solid var(--line); vertical-align: top; }
th { color: var(--muted); font-weight: 600; font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; }
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
.scroll { overflow-x: auto; }
.badge {
  display: inline-block; padding: 0 .5em; border-radius: 99px;
  font-size: .78rem; font-weight: 600; line-height: 1.6; color: var(--bg);
}
.badge.queued { background: var(--queued); }
.badge.running { background: var(--running); }
.badge.parked { background: var(--parked); }
.badge.done { background: var(--done); }
.badge.failed { background: var(--failed); }
.chips { display: flex; gap: .4rem; margin: .8rem 0; flex-wrap: wrap; }
.chips a {
  padding: .1rem .7rem; border: 1px solid var(--line); border-radius: 99px;
  text-decoration: none; color: var(--fg); font-size: .85rem;
}
.chips a.on { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.card {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: .9rem 1.1rem; margin: .8rem 0;
}
.gate { border-left: 4px solid var(--parked); }
.gate .prompt { white-space: pre-wrap; }
.gate label.opt { display: block; margin: .3rem 0; }
.gate textarea, .gate input[type=text] {
  width: 100%; max-width: 32rem; background: var(--bg); color: var(--fg);
  border: 1px solid var(--line); border-radius: 6px; padding: .4rem .6rem; font: inherit;
}
.gate button {
  margin-top: .7rem; padding: .45rem 1.1rem; border: 0; border-radius: 6px;
  background: var(--accent); color: #fff; font: inherit; font-weight: 600; cursor: pointer;
}
.muted { color: var(--muted); }
.kv { display: flex; flex-wrap: wrap; gap: .3rem 2rem; margin: .4rem 0 1rem; }
.kv div { font-size: .9rem; }
.kv b { display: block; font-size: .74rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
details { margin: .4rem 0; }
details pre {
  white-space: pre-wrap; word-break: break-word; background: var(--card);
  border: 1px solid var(--line); border-radius: 6px; padding: .6rem .8rem;
}
details.inputs, .io { margin: .4rem 0; }
.io pre { margin: .2rem 0; }
.io b { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; }
.artifacts { list-style: none; padding: 0; }
.artifacts li { margin: .4rem 0; }
.ev {
  display: inline-block; padding: 0 .45em; border-radius: 4px;
  background: var(--card); border: 1px solid var(--line);
  font-family: ui-monospace, Menlo, monospace; font-size: .78rem;
}
/* Timeline: a left rule with state nodes and transition connectors. */
ol.timeline { list-style: none; margin: .5rem 0; padding: 0 0 0 1rem; border-left: 2px solid var(--line); }
ol.timeline > li { position: relative; margin: .1rem 0; padding: .15rem 0 .15rem .8rem; }
.tl-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: .35rem; }
.tl-head .dot {
  position: absolute; left: -1.5rem; top: .5rem; width: .55rem; height: .55rem;
  border-radius: 99px; background: var(--accent);
}
.tl-meta { font-size: .82rem; }
.tl-trans { color: var(--muted); font-family: ui-monospace, Menlo, monospace; font-size: .85rem; }
.tl-trans.implicit { opacity: .55; }
.tl-park { color: var(--parked); }
.tl-resume { color: var(--done); }
.tl-fail { color: var(--failed); font-size: .85rem; margin: .2rem 0 .2rem .3rem; }
.tl-wrote { font-size: .84rem; margin: .15rem 0 .15rem .3rem; }
pre.msg { margin: .3rem 0; }
/* State-machine diagram: an inline SVG whose colors ride the same status vars
   as the badges, plus a pan/zoom viewport and a hover panel. */
.graph-wrap { position: relative; border: 1px solid var(--line); border-radius: 8px; background: var(--card); overflow: hidden; margin: .8rem 0; }
.graph-viewport { overflow: hidden; height: 440px; cursor: grab; touch-action: none; }
.graph-viewport.dragging { cursor: grabbing; }
.graph-svg { display: block; max-width: 100%; height: auto; font: 12px ui-monospace, Menlo, monospace; user-select: none; }
.graph-svg .node rect { fill: var(--bg); stroke: var(--muted); stroke-width: 1.5; }
.graph-svg .node text { fill: var(--fg); }
.graph-svg .node.initial rect { stroke: var(--accent); stroke-width: 2; }
.graph-svg .node.kind-human rect { stroke: var(--parked); }
.graph-svg .node.kind-terminal rect { fill: var(--card); }
.graph-svg .node.kind-terminal text { fill: var(--done); }
.graph-svg .node.kind-terminal.status-failed text { fill: var(--failed); }
.graph-svg .node.failed rect { stroke: var(--failed); stroke-width: 2; }
.graph-svg .node.current rect { stroke: var(--running); stroke-width: 3; }
.graph-svg .node.parked rect { stroke: var(--parked); stroke-width: 3; }
.graph-svg.has-run .node:not(.visited):not(.current) { opacity: .4; }
.graph-svg .edge path { stroke: var(--muted); stroke-width: 1.5; }
.graph-svg .edge.edge-catch path, .graph-svg .edge.edge-timeout path { stroke-dasharray: 5 3; }
.graph-svg .edge.fired path { stroke: var(--running); stroke-width: 2.5; }
.graph-svg .edge-label { fill: var(--muted); paint-order: stroke; stroke: var(--bg); stroke-width: 3px; }
.graph-svg .gv-arrowhead { fill: var(--muted); }
.graph-svg .gv-arrowhead-fired { fill: var(--running); }
.graph-hint { position: absolute; top: .4rem; right: .5rem; z-index: 2; font-size: .72rem; color: var(--muted); background: var(--bg); border: 1px solid var(--line); border-radius: 4px; padding: .05rem .45rem; opacity: .85; pointer-events: none; }
.graph-panel { position: absolute; z-index: 3; pointer-events: none; display: none; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: .35rem .55rem; font-size: .8rem; box-shadow: 0 2px 10px rgba(0,0,0,.18); max-width: 22rem; }
.graph-panel .muted { color: var(--muted); }
.graph-legend { display: flex; flex-wrap: wrap; gap: .3rem 1rem; padding: .45rem .7rem; font-size: .76rem; color: var(--muted); border-top: 1px solid var(--line); }
.graph-legend span { display: inline-flex; align-items: center; gap: .35rem; }
.graph-legend i { width: .8rem; height: .8rem; border-radius: 3px; border: 2px solid var(--muted); box-sizing: border-box; }
.graph-legend i.current { border-color: var(--running); }
.graph-legend i.visited { border-color: var(--line); background: var(--card); }
.graph-legend i.parked { border-color: var(--parked); }
.graph-legend i.failed { border-color: var(--failed); }
</style>
</head>
<body>
<header>
  <a class="brand" href="/runs">steps</a>
  <span class="sub">runs &amp; gates</span>
</header>
<main>
{{end}}

{{define "page_foot"}}
</main>
</body>
</html>
{{end}}

{{define "status"}}<span class="badge {{.}}">{{.}}</span>{{end}}
