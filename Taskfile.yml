version: 3

tasks:
  default:
    cmds:
      - task: fmt
      - task: test

  fmt:
    desc: Lint (with --fix) and format the codebase
    cmds:
      - golangci-lint run ./... --fix
      - gofmt -w .
      - deno fmt docs/ examples/

  test:
    desc: Run the full test suite with the race detector
    cmds:
      - go test -race ./...
